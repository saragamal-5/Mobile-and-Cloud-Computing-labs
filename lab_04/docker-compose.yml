version: "3.9"

services:
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "5011:5001"
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "5003:5002"
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:5001
    depends_on:
      - product-service
    restart: unless-stopped